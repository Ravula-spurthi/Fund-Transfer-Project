<div class="dashboard">

  <h1>Fund Transfer Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h3>Account Number</h3>
      <p>1234567890</p>
    </div>

    <div class="card">
      <h3>Available Balance</h3>
      <p>₹ 50,000</p>
    </div>

    <div class="card">
      <h3>Last Transaction</h3>
      <p>₹ 2,000 Debited</p>
    </div>

  </div>

  <div class="actions">
    <button (click)="goToBeneficiary()">Add Beneficiary</button>
    <button (click)="goToTransfer()">Fund Transfer</button>
    <button (click)="goToTransactions()">Transactions</button>
    <button (click)="goToProfile()">Profile</button>
    <button (click)="goToStatement()">Statement</button>
    <button (click)="logout()">Logout</button>
  </div>

</div>
