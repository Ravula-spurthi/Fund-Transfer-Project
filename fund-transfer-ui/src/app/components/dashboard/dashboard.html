<div class="dashboard-container">

    <div class="sidebar">

        <h2>Fund Transfer</h2>

        <button (click)="goToBeneficiary()">
            Add Beneficiary
        </button>

        <button (click)="goToTransfer()">
             Fund Transfer
           </button>

        <button (click)="goToScheduledTransfer()">
              Scheduled Transfers
           </button>

<button (click)="goToTransactions()">
    Transactions
</button>

        <button (click)="goToStatement()">
            Statement
        </button>

        <button (click)="goToProfile()">
            Profile
        </button>

        <!--
        <button (click)="goToSetPin()">
            Set Transaction PIN
        </button>

        <button (click)="goToChangePin()">
            Change Transaction PIN
        </button>
    -->
       

        <button (click)="logout()">
            Logout
        </button>

    </div>

    <div class="main-content">

        <h1>Welcome {{userName}}</h1>

        <div class="cards">

            <!-- Account Number -->

            <div class="card">

                <h3>Account Number</h3>

                <h2>{{dashboard.accountNumber}}</h2>

            </div>

            <!-- Available Balance -->

            <div class="card">

                <h3>Available Balance</h3>

                <h2 *ngIf="showBalance">
                    ₹ {{dashboard.balance}}
                </h2>

                <h2 *ngIf="!showBalance">
                    ********
                </h2>

                <br>

                <button
                    *ngIf="!showBalance"
                    (click)="viewBalance()">

                    View Balance

                </button>

                <button
                    *ngIf="showBalance"
                    (click)="hideBalance()">

                    Hide Balance

                </button>

            </div>

        </div>

        <!-- Quick Actions -->

        <div class="quick-actions">

            <button (click)="goToBeneficiary()">
                Add Beneficiary
            </button>

            <button (click)="goToTransfer()">
                Quick Transfer
            </button>

            <button (click)="goToTransactions()">
                View Transactions
            </button>

           
        </div>

    </div>

</div>
