<div class="login-container">

<div class="login-card">

<h1>Fund Transfer System</h1>

<div class="role-selection">

<label>

<input
type="radio"
name="role"
value="user"
[(ngModel)]="role">

User

</label>

<label>

<input
type="radio"
name="role"
value="admin"
[(ngModel)]="role">

Admin

</label>

</div>

<input
type="email"
placeholder="Email"
[(ngModel)]="email">

<input
type="password"
placeholder="Password"
[(ngModel)]="password">

<div class="captcha-box">

<span>{{captcha}}</span>

<button
type="button"
(click)="refreshCaptcha()">

Refresh

</button>

</div>

<input
type="text"
placeholder="Enter CAPTCHA"
[(ngModel)]="enteredCaptcha">

<button
(click)="onlogin()">

Login

</button>

<div class="links">

<a routerLink="/signup">

Sign Up

</a>

<a routerLink="/forgot-password">

Forgot Password?

</a>

</div>

</div>

</div>
