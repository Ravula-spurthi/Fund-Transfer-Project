<div class="container">

  <h2>Add Beneficiary</h2>

  <input
    type="text"
    placeholder="Beneficiary Name"
    [(ngModel)]="beneficiary.beneficiaryName">

  <input
    type="text"
    placeholder="Account Number"
    [(ngModel)]="beneficiary.accountNumber">

  <input
    type="text"
    placeholder="Bank Name"
    [(ngModel)]="beneficiary.bankName">

  <input
    type="text"
    placeholder="IFSC Code"
    [(ngModel)]="beneficiary.ifscCode">

  <button (click)="addBeneficiary()">
    Add Beneficiary
  </button>

</div>
