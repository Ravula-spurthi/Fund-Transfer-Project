<div class="container">

  <h2>Beneficiary List</h2>

  <p class="record-count">
    Total Beneficiaries: {{ beneficiaries.length }}
  </p>

  <table *ngIf="beneficiaries && beneficiaries.length > 0">

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Account Number</th>
        <th>Bank</th>
        <th>IFSC</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let b of beneficiaries; let i = index">

        <td>{{ i + 1 }}</td>
        <td>{{ b['beneficiaryName'] }}</td>
        <td>{{ b['accountNumber'] }}</td>
        <td>{{ b['bankName'] }}</td>
        <td>{{ b['ifscCode'] }}</td>

        <td>
          <button class="delete-btn"
                  (click)="deleteBeneficiary(b.id)">
            Delete
          </button>
        </td>

      </tr>

    </tbody>

  </table>

  <div class="no-data" *ngIf="beneficiaries.length === 0">
    No Beneficiaries Found
  </div>

</div>
