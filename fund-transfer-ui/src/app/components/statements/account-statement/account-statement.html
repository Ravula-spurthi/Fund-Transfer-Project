<div class="statement-container">

  <h2>Account Statement</h2>

  <div class="filter-section">

    <label><b>Transaction Date:</b></label>

    <input
      type="date"
      [(ngModel)]="transactionDate">

    <button (click)="filterTransactions()">
      Filter
    </button>

    <button (click)="loadStatement()">
      Show All
    </button>

  </div>

  <br>

  <table border="1" width="100%">

    <thead>

      <tr>

        <th>
          <input
            type="checkbox"
            [(ngModel)]="selectAll"
            (change)="toggleSelectAll()">
        </th>

        <th>Date</th>
        <th>Beneficiary</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Type</th>
        <th>Balance</th>
        <th>Remarks</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let t of transactions">

        <td>

          <input
            type="checkbox"
            [(ngModel)]="t.selected">

        </td>

        <td>{{t.transactionDate}}</td>

        <td>{{t.beneficiaryName}}</td>

        <td>₹ {{t.amount}}</td>

        <td>{{t.status}}</td>

        <td>{{t.transactionType}}</td>

        <td>₹ {{t.balance}}</td>

        <td>{{t.remarks}}</td>

      </tr>

      <tr *ngIf="transactions.length==0">

        <td colspan="8" style="text-align:center">

          No Transactions Found

        </td>

      </tr>

    </tbody>

  </table>

  <br>

  <button (click)="downloadSelectedPDF()">

    Download Selected Transactions

  </button>

</div>
