<div class="statement-container">

  <h2>Account Statement</h2>

  

  <table border="1" width="100%">

    <thead>
      <tr>
        <th>Date</th>
        <th>Beneficiary</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Type</th>
        <th>Balance</th>
        <th>Remarks</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let t of transactions">
        <td>{{ t.transactionDate }}</td>
        <td>{{ t.beneficiaryName }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.status }}</td>
        <td>{{ t.transactionType }}</td>
        <td>{{ t.balance }}</td>
        <td>{{ t.remarks }}</td>
      </tr>
    </tbody>

  </table>

</div>
