<div class="transaction-container">

  <h2>Transaction History</h2>

  <table>

    <thead>
      <tr>
        <th>Date</th>
        <th>Beneficiary</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let txn of transactions">
        <td>{{txn.date}}</td>
        <td>{{txn.beneficiary}}</td>
        <td>₹ {{txn.amount}}</td>
        <td>{{txn.status}}</td>
      </tr>
    </tbody>

  </table>

</div>
