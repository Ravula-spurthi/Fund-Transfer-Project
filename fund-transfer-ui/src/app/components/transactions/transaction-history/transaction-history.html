<div class="transaction-container">

  <h2>Transaction History</h2>
  

  <h3>Total Transactions: {{ transactions.length }}</h3>

  <div *ngIf="transactions.length === 0">
    No Data Found
  </div>

  <table *ngIf="transactions.length > 0" border="1">

    <thead>
      <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Beneficiary</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let txn of transactions">
        <td>{{ txn.id }}</td>
        <td>{{ txn.transactionDate }}</td>
        <td>{{ txn.beneficiaryName }}</td>
        <td>{{ txn.amount }}</td>
        <td>{{ txn.status }}</td>
      </tr>
    </tbody>

  </table>

</div>
