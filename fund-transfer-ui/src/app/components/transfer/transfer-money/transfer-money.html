<h2>Fund Transfer</h2>

<form (ngSubmit)="transfer()">

  <input
      type="text"
      placeholder="Beneficiary Name"
      [(ngModel)]="transferData.beneficiaryName"
      name="beneficiaryName">

  <br><br>

  <input
      type="number"
      placeholder="Amount"
      [(ngModel)]="transferData.amount"
      name="amount">

  <br><br>

  <button type="submit">
      Transfer
  </button>

  <button type="button" (click)="resetForm()">
      Reset
  </button>

</form>
