<div class="forgot-container">

    <h2>Forgot Password</h2>

    <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email">

    <input
        type="text"
        placeholder="Mobile Number"
        [(ngModel)]="mobile">

    <input
        type="password"
        placeholder="New Password"
        [(ngModel)]="newPassword">

    <input
        type="password"
        placeholder="Confirm Password"
        [(ngModel)]="confirmPassword">

    <button (click)="updatePassword()">
        Update Password
    </button>

    <br><br>

    <a routerLink="/login">
        Back to Login
    </a>

</div>
